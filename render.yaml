services:
  - type: web
    name: clinicmanager
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clinic-db
          property: connectionString
      - key: CLINIC_PASSWORD
        sync: false
      - key: BACKEND_URL
        sync: false   # Set to your Render service URL e.g. https://clinicmanager-xxxx.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false   # Set to your Render service URL e.g. https://clinicmanager-xxxx.onrender.com
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_FROM
        sync: false   # "From" email address for outgoing emails
      - key: SMTP_USER
        sync: false   # Clinic email address that receives notifications

databases:
  - name: clinic-db
    databaseName: clinic
    user: clinic
